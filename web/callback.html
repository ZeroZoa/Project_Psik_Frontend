<!DOCTYPE html>
<html>
<head>
    <title>Auth Callback</title>
</head>
<body>
<script>
    // URL에 있는 토큰 정보(쿼리 파라미터)를 가져옵니다.
    const params = window.location.search;

    // 이 창을 연 부모 창(Flutter 앱)에게 메시지를 보냅니다.
    if (window.opener) {
        window.opener.postMessage(params, window.location.origin);
        window.close(); // 할 일 다 했으니 창 닫기
    }
</script>
</body>
</html>
