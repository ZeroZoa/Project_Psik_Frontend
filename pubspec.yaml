name: skinner_frontend
description: "Frontend project for skinner"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  flutter_inappwebview: ^6.1.5
  flutter_secure_storage: ^10.0.0
  dio: ^5.9.0
  flutter_dotenv: ^6.0.0
  provider: ^6.1.5
  go_router: ^17.0.1
  flutter_web_auth_2: ^5.0.1
  flutter_svg: ^2.2.3
  logger: ^2.6.2
  intl: ^0.20.2
  flutter_webview_plugin: ^0.4.0
  universal_html: ^2.3.0
  image_picker: ^1.2.1
  http_parser:

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - .env
    - assets/images/