name: psik_frontend
description: "Frontend project for psik"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  flutter_inappwebview: ^6.1.5
  flutter_secure_storage: ^10.0.0
  dio: ^5.9.0
  provider: ^6.1.5
  go_router: ^17.0.1
  flutter_web_auth_2: ^5.0.1
  flutter_svg: ^2.2.3
  logger: ^2.6.2
  intl: ^0.20.2
  universal_html: ^2.3.0
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  fl_chart: ^1.2.0
  http_parser: ^4.0.0

  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/